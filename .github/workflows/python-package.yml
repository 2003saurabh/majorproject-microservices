name: CI Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  compile:
    name: Compile Python Code
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project/microservice/requirements.txt
          pip install -r project/auth_service/requirements.txt
          pip install -r project/orders_service/requirements.txt

      - name: Compile Python Files
        run: |
          python -m compileall -f .

  lint:
    name: Lint Code
    needs: compile
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r project/microservice/requirements.txt
          pip install -r project/auth_service/requirements.txt
          pip install -r project/orders_service/requirements.txt

      - name: Run Flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx pytest-asyncio
          pip install -r project/microservice/requirements.txt
          pip install -r project/auth_service/requirements.txt
          pip install -r project/orders_service/requirements.txt

      - name: Run Pytest
        run: |
          pytest project/tests -v

  gitleaks:
    name: Gitleaks Secret Scan
    needs: compile
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run Gitleaks Scan
        run: |
          ./gitleaks detect --source . --verbose --redact --exit-code 1

  trivy:
    name: Trivy Filesystem Scan
    needs: [test, gitleaks]
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.tar.gz | tar -xz trivy
          chmod +x trivy
          ./trivy version

      - name: Run Trivy FS Scan
        run: |
          ./trivy fs . --severity HIGH,CRITICAL --exit-code 1

  sonarqube:
    name: SonarQube Analysis
    needs: trivy
    runs-on: Agent-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    name: Docker Build & Push
    needs: sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Items Service
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/items:latest -t ${{ vars.DOCKERHUB_USERNAME }}/items:${{ github.sha }} ./project/microservice
          docker push ${{ vars.DOCKERHUB_USERNAME }}/items --all-tags

      - name: Build & Push Auth Service
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/auth:latest -t ${{ vars.DOCKERHUB_USERNAME }}/auth:${{ github.sha }} ./project/auth_service
          docker push ${{ vars.DOCKERHUB_USERNAME }}/auth --all-tags

      - name: Build & Push Orders Service
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/orders:latest -t ${{ vars.DOCKERHUB_USERNAME }}/orders:${{ github.sha }} ./project/orders_service
          docker push ${{ vars.DOCKERHUB_USERNAME }}/orders --all-tags
  
