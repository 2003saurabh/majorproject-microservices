version: "3.9"

services:

  # ── Items service (existing) — port 8000 ────────────────────────────────────
  items:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Auth service — port 8001 ─────────────────────────────────────────────────
  auth:
    build: ./auth_service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # Email — set these in a .env file at project root
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM:    ${EMAIL_FROM:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Postgres (shared, one instance) ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
