apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: microservices-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: 288761736206.dkr.ecr.ap-south-1.amazonaws.com/orders:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8002

        # 🔥 Load env
        envFrom:
        - configMapRef:
            name: orders-config
        - secretRef:
            name: orders-secret

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /docs
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /docs
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
